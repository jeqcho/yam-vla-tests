# MolmoAct2 — AllenAI bimanual YAM finetune.
# Wire format: HTTP + json_numpy on port 8202.
# Server source: _archive/molmoact2-setup/molmoact2/examples/yam/host_server_yam.py
#
# All defaults below are verified against upstream:
#   - port 8202        : host_server_yam.py:326 (default=8202)
#   - image_keys.*     : host_server_yam.py:261-263 payload destructuring
#   - num_steps 10     : host_server_yam.py:65 (DEFAULT_NUM_STEPS = 10)
#                        Also confirmed on the AllenAI HF model card text:
#                        "defaults to the checkpoint config value, 10"
#   - action_horizon 30: hf-cache/...norm_stats.json:metadata_by_tag.
#                        yam_dual_molmoact2.action_horizon = 30
#
# Server-side defaults you DON'T set here (host_server_yam.py handles them):
#   enable_cuda_graph=True       (first call slow as CUDA graphs capture)
#   normalize_language=True      (lowercases + strips trailing punctuation)
#   enable_depth_reasoning=False (REQUIRED — calling True raises)
#   norm_tag="yam_dual_molmoact2" (REQUIRED at inference)
#   inference_action_mode="continuous"  (default, recommended)

policy: molmoact2
model_id: allenai/MolmoAct2-BimanualYAM
transport:
  scheme: http
  host: 127.0.0.1
  port: 8202
  path: /act

# role -> wire image key. Change here if a future checkpoint renames.
image_keys:
  top: top_cam
  left_wrist: left_cam
  right_wrist: right_cam

# Backend-specific knobs (passed through Policy.predict as **opts).
options:
  num_steps: 10            # flow-matching solver steps; +N = slower, smoother

# Used by the eval/REPL harnesses to set sensible defaults for the control loop.
control:
  action_horizon_hint: 30  # number of (14,) action rows per chunk
  # horizon_stride_default = actions played per chunk before re-querying.
  # We respect the upstream convention: stride = action_horizon, i.e.
  # play the entire 30-row chunk before triggering the next inference.
  # That matches what norm_stats.json declares
  # (action_horizon = n_action_steps = 30) and what the model was
  # trained to execute as a coherent plan -- the LeRobot diffusion-
  # policy convention π₀, GR00T-N1.7, and MolmoAct2 all inherit.
  # At 30 Hz this is ~1 s of open-loop motion per inference, which
  # makes the loop firmly playback-bound regardless of RTT.
  # Override via --horizon-stride if you want an MPC-style receding-
  # horizon loop (e.g. stride < 30 for contact-rich / dynamic tasks).
  horizon_stride_default: 30

  # 14-D "ready pose" the harness ramps to before each rollout AND
  # between attempts. Derived from action_stats.mean in norm_stats.json
  # (the centroid of training-action distribution) with the LEFT/RIGHT
  # arms forced into exact bilateral symmetry: per-joint magnitudes
  # averaged, signs preserved per the original mirror structure
  # (joints 1, 5, 6 are sign-flipped). Recomputed at policy-update time
  # via `yam_vla.core.hardware.load_canonical_ready_pose(
  #     <hf-cache>/norm_stats.json, "yam_dual_molmoact2",
  #     decimals=2, mirror_symmetrize=True)`.
  # The harness preserves whatever gripper opening is current at
  # indices 6 and 13 -- the gripper values below are placeholders that
  # get overwritten with each arm's startup pose immediately before
  # the ramp, so we don't slam-close on whatever is held.
  #
  #               j1     j2    j3    j4    j5     j6    grip
  ready_pose: [-0.10,  1.36, 1.18, -0.70,  0.16, -0.22, 0.62,   # left arm
                0.10,  1.36, 1.18, -0.70, -0.16,  0.22, 0.62]   # right arm
  ready_pose_ramp_duration_s: 5.0
