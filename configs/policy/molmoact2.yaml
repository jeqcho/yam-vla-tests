# MolmoAct2 — AllenAI bimanual YAM finetune.
# Wire format: HTTP + json_numpy on port 8202.
# Server source: _archive/molmoact2-setup/molmoact2/examples/yam/host_server_yam.py
#
# All defaults below are verified against upstream:
#   - port 8202        : host_server_yam.py:326 (default=8202)
#   - image_keys.*     : host_server_yam.py:261-263 payload destructuring
#   - num_steps 10     : host_server_yam.py:65 (DEFAULT_NUM_STEPS = 10)
#                        Also confirmed on the AllenAI HF model card text:
#                        "defaults to the checkpoint config value, 10"
#   - action_horizon 30: hf-cache/...norm_stats.json:metadata_by_tag.
#                        yam_dual_molmoact2.action_horizon = 30
#
# Server-side defaults you DON'T set here (host_server_yam.py handles them):
#   enable_cuda_graph=True       (first call slow as CUDA graphs capture)
#   normalize_language=True      (lowercases + strips trailing punctuation)
#   enable_depth_reasoning=False (REQUIRED — calling True raises)
#   norm_tag="yam_dual_molmoact2" (REQUIRED at inference)
#   inference_action_mode="continuous"  (default, recommended)

policy: molmoact2
model_id: allenai/MolmoAct2-BimanualYAM
transport:
  scheme: http
  host: 127.0.0.1
  port: 8202
  path: /act

# role -> wire image key. Change here if a future checkpoint renames.
image_keys:
  top: top_cam
  left_wrist: left_cam
  right_wrist: right_cam

# Backend-specific knobs (passed through Policy.predict as **opts).
options:
  num_steps: 10            # flow-matching solver steps; +N = slower, smoother

# Used by the eval/REPL harnesses to set sensible defaults for the control loop.
control:
  action_horizon_hint: 30  # number of (14,) action rows per chunk
  horizon_stride_default: 6
