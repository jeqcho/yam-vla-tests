[project]
name = "molmoact2-yam-setup"
version = "0.1.0"
description = "MolmoAct2 inference server setup for bimanual YAM (RTX 5090 host)"
requires-python = ">=3.11,<3.12"
dependencies = [
    "torch==2.5.1",
    "torchvision==0.20.1",
    "transformers>=4.57,<4.58",
    "tokenizers>=0.20",
    "accelerate",
    "safetensors",
    "fastapi",
    "uvicorn[standard]",
    "json-numpy",
    "huggingface_hub[cli]",
    "hf-transfer",
    "pillow",
    "numpy",
    "requests",
    "python-can",
]

[tool.uv]
package = false

[tool.uv.sources]
torch = { index = "pytorch-cu121" }
torchvision = { index = "pytorch-cu121" }

[[tool.uv.index]]
name = "pytorch-cu121"
url = "https://download.pytorch.org/whl/cu121"
explicit = true
