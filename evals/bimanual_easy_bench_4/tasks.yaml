name: bimanual_easy_bench_4
description: |
  Four-task diagnostic suite for bimanual manipulation on the YAM rig.
  Designed bottom-up from the BimanualYAM training-corpus clusters --
  every task in this suite directly emulates one of the four largest
  task families the policy was trained on.

  Reformulated (third pass) after the earlier 8 -> 5 -> 4 prunes still
  left the suite OOD-leaning. K-means clustering of 1387 unique
  training annotations (sentence-transformers MiniLM embeddings,
  k=5) revealed five distinct training task-families:

    Cluster 0  9% : Charging workflow (Grasp + plug + switch)
    Cluster 1 36% : Block arrangement (line / formation)
    Cluster 2 17% : Block spelling (AI2, CVPR, ROBOT, RSS)
    Cluster 3 17% : Stationery box-loading (marker, tape, ruler)
    Cluster 4 22% : Snack/multi-item box-loading (close lid)

  Cluster 2 dropped (no letter blocks in inventory). Remaining 4 tasks
  draw from clusters 0, 1, 3, and a held-receptacle variant of cluster
  3/4. Each instruction is paraphrased close to its cluster centroid
  to maximize in-distribution alignment.

  Trade-off vs the prior OOD-heavy suite:
    GAINED  -- expected per-task pass rates 50-80% instead of 0-30%
              measures deployment reliability on trained primitives
    LOST    -- diagnostic coverage of un-trained primitives
              (stabilize+pull, midair convergence, wide-rigid lift,
              symmetric deformable, etc.)

  Use this suite when you want to see the model actually work. Use
  bimanual_easy_bench_4's prior version (in git history at any commit
  before this YAML rewrite) when you want primitive-diversity stress
  testing.

n_attempts_default: 3

# Inter-attempt scene-reset countdown. Soft target only; never auto-
# advances. Press right-arrow or Enter to advance.
reset_seconds_default: 30

tasks:
  - id: arrange_cubes_line
    english: arrange four cubes in a line
    instruction: "Pick up the four orange cubes and arrange them in a horizontal line."
    meta:
      training_cluster: 1 (block arrangement; 36% of BimanualYAM corpus)
      primitive: parallel-pick + arrange in formation
      setup: |
        Four orange cubes scattered on the table within reach of both
        arms. The closest corpus annotation is "Pick up blocks and
        arrange them in a horizontal line." (23 occurrences). Our
        version specifies "the four orange cubes" because the rest
        of the suite uses orange cubes; this gives the policy a
        consistent object class to ground on across tasks.

  - id: marker_apple_into_box
    english: place marker and apple into box
    instruction: "Place the red marker and the apple into the gray box."
    meta:
      training_cluster: 3 (stationery box-loading; 17% of corpus)
      primitive: multi-object placement into stationary container
      setup: |
        Gray box on the table (no lid; user does NOT have a closeable
        box). Red marker and apple within reach. The closest corpus
        annotation pattern is "Place green tape, white tape, and pens
        into the box." (multi-object, no close). We deliberately
        skip a "then close the box" coda because the user's gray box
        has no lid; that's also fine vs. the corpus -- 416/591 multi-
        item placements in the corpus go without a close clause.

  - id: cube_into_gray_box
    english: cube into held gray box
    instruction: "Pick up the gray box with your left arm and place the orange cube into the box with your right arm."
    meta:
      training_cluster: 3 + 4 hybrid (held-receptacle variant)
      primitive: bimanual insertion (held receptacle)
      aloha_ancestor: ALOHA peg-in-socket
      setup: |
        Empty gray box on the LEFT side of the workspace, orange cube
        on the RIGHT side. Bimanual structure is forced by the explicit
        "Pick up the gray box first" clause. Matches the corpus's
        dominant "Pick up + Place X into Y" template; the held-in-air
        receptacle aspect is the bimanual primitive being measured.

  - id: plug_socket_into_outlet
    english: plug socket into outlet
    instruction: "Grasp the black socket, then plug it into the white outlet."
    meta:
      training_cluster: 0 (charging workflow; 9% of corpus)
      primitive: stabilize + axial-insertion under alignment
      setup: |
        White wall outlet (taken out of a wall, sitting on the table)
        on the right side. Black socket / plug on the left side. The
        closest corpus template is the first two clauses of every
        charging annotation:
          "Grasp the charger cable, plug it into the phone, then..."
        Our version drops the third clause (no switch on the standalone
        outlet) but preserves the canonical "Grasp X, then plug it into
        Y" template. This is the most templated cluster in the corpus
        (centroid similarity 0.78-0.97 for in-cluster annotations);
        if our wording matches the template even loosely, the policy
        should produce a confident attempt.
