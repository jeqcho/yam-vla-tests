name: bimanual_easy_bench_8
description: |
  Eight-task diagnostic suite for bimanual-only manipulation primitives on
  the YAM rig. Each task isolates ONE bimanual primitive that has no
  single-arm reduction. Atomic single-instruction prompts — no chained
  subgoals — so per-task success rate reflects one skill, not the product
  of several.

  Prompting principles applied (see README.md for sources):
    - Imperative present tense, no metalanguage ("hold steady" not
      "stabilize"; "with both arms" not "use both grippers")
    - "your left arm" / "your right arm" — most-trained phrasing in
      ALOHA / pi0 / MolmoAct datasets vs "gripper" or "manipulator"
    - Every object disambiguated by visible attribute (color before noun)
    - No pronouns — every noun restated to avoid anaphora that depends
      on the model's working memory
    - Clean grammar (pi0 freezes on typos / ambiguity per the pi0 paper)
    - Single atomic verb-result, no "then" chaining unless the second
      action is the only verifiable end-state

n_attempts_default: 3

# Inter-attempt scene-reset countdown. The flow is:
#   1. Banner shows TASK + ITER N of X + PROMPT
#   2. Operator → to start; arms execute the rollout
#   3. Operator → to end the rollout (or wait for max_chunks)
#   4. Operator scores s/f/u/r
#   5. Arms ramp back to ready pose
#   6. Reset countdown runs while operator resets the physical scene
#   7. Countdown expires OR operator presses → → next iteration
# Override per-run with --reset-seconds N (0 disables the countdown).
reset_seconds_default: 30

tasks:
  - id: bag_fold
    english: bag fold
    instruction: "Fold the white plastic bag in half from right to left so the right side meets the left side."
    meta:
      primitive: symmetric_coord_deformable
      aloha_ancestor: ALOHA towel / cloth fold
      setup: |
        White plastic garbage bag laid flat on the table as a
        rectangle (the bag's natural geometry when emptied). A red
        drawstring line runs across the top edge -- this is the high-
        contrast visual anchor the policy grounds on. Fold motion
        brings the right half of the bag over to meet the left half.

        Why a bag instead of a t-shirt (the previous task):
          - Rectangle has an obvious vertical centerline; T-shirt
            silhouette is a T-shape with non-trivial concavities at
            the sleeve junctions.
          - Red line provides a high-contrast feature for visual
            grounding; white-shirt-on-white-table is visually uniform.
          - Post-fold geometry is a deterministic smaller rectangle;
            shirts fold into irregular drape shapes that are hard
            to score.

  - id: velcro_pull
    english: velcro pull-apart
    instruction: "Pull apart the two black velcro strips."
    meta:
      primitive: opposing_impulsive_force
      aloha_ancestor: ALOHA velcro cable tie (reversed)
      setup: |
        Two black velcro strips pressed together at a perpendicular cross,
        centered on the table. Re-press to a target force between trials
        to keep starting bond strength uniform.

  - id: cube_handoff
    english: cube hand-off to plate
    instruction: "Pick up the orange cube and place it on the green plate."
    meta:
      primitive: discrete_midtraj_transfer
      aloha_ancestor: ALOHA cube transfer
      setup: |
        Orange cube positioned on the LEFT side of the workspace, within
        comfortable reach of the left arm. Green plate on the RIGHT side,
        within comfortable reach of the right arm. The bimanual handoff
        primitive is now IMPLICIT in the spatial setup: the cube and
        plate are placed so a clean single-arm reach is awkward, and
        the policy must (it is hoped) use a left-pick + right-place
        sequence with a midline handoff. This reformulation drops the
        explicit "your left arm / your right arm / pass" language
        because all three phrasings are 0/591 in the BimanualYAM
        training corpus.

  - id: wire_rack_lift
    english: wire rack lift
    instruction: "Grasp the black wire rack, then lift it off the table."
    meta:
      primitive: coordinated_wide_rigid_lift
      aloha_ancestor: (no direct ALOHA analog; ALOHA-2 bimanual tray task)
      setup: |
        Black wire rack flat on the table. Operator deliberately does
        NOT specify which edges or bars the grippers should target --
        the policy gets full discretion on grasp point selection.
        Success = rack is lifted clear of the table with both grippers
        engaged. The motor primitive being scored is "both grippers
        commit force at the same time to a single rigid object," not
        "did the policy match a specific grasp-pose heuristic."

  - id: pour_cubes
    english: pour cubes onto plate
    instruction: "Grasp the orange cup, then place the orange cubes into the green plate."
    meta:
      primitive: asymmetric_tool_and_receiver
      aloha_ancestor: ALOHA chip-bag pour
      setup: |
        Orange cup half-full of small orange cubes on the right side.
        Green plate on the left side. Both must end held off the table.

        Reformulated for corpus alignment: drops "pour" (0/591 in the
        BimanualYAM training corpus) and "your X arm" (0/591) for
        "Grasp X, then place Y into Z" which is the dominant corpus
        template (box-dataset annotations use exactly this pattern).
        The primitive being measured shifts slightly -- this is now
        "grasp cup + transfer contents into plate" rather than "pour
        continuous flow", but the bimanual asymmetric-tool-and-receiver
        structure is preserved (cup is the tool, plate is the receiver).

  - id: rail_tap
    english: rail tap
    instruction: "Pick up the two wooden rails, then place them next to each other."
    meta:
      primitive: midair_bimanual_convergence
      aloha_ancestor: (refined from ALOHA bimanual insertion, precision-alignment stripped out)
      setup: |
        Two short wooden rail segments, one on each side of the
        workspace.

        Reformulated for corpus alignment: drops "tap" (0/591) and
        "together" (0/591) for the in-distribution "Pick up X, then
        place [adjacent]" template. "Next to each other" uses the
        corpus's "next to" relation (17/591 block-arrangement
        annotations). The primitive shifts slightly: from "two arms
        converge in midair" to "two arms each pick a rail and place
        adjacent". The bimanual structure is preserved because two
        rails picked simultaneously require both grippers; the
        in-air convergence aspect is relaxed to convergence-on-table.

  - id: marker_uncap
    english: marker uncap
    instruction: "Pull the cap off the red marker."
    meta:
      primitive: stabilize_plus_axial_pull
      aloha_ancestor: ALOHA cup uncap
      setup: |
        Red marker (capped) centered on the table, oriented so the cap
        end faces the right arm.

        Reformulated for corpus alignment: drops "Hold ... with your
        left arm and ... with your right arm" (all 0/591). The new
        phrasing keeps "Pull off" (still 0/591 -- no in-distribution
        verb exists for this primitive) but the rest of the sentence
        is grammatically natural. The bimanual stabilize+pull primitive
        is now IMPLICIT: the marker is loose on the table, the only
        way to extract the cap without the body sliding is for one
        gripper to anchor while the other pulls -- the policy should
        infer this from the physics of the setup, not from explicit
        arm-side instructions.

  - id: allen_wrench_turn
    english: allen wrench rotation
    instruction: "Turn the allen wrench in the wooden block."
    meta:
      primitive: stabilize_plus_torque
      aloha_ancestor: ALOHA cup uncap (rotational variant)
      setup: |
        Wooden block with embedded screw + allen wrench seated, block
        flat on the table.

        Reformulated for corpus alignment: drops "Hold ... with your
        left arm" (0/591) and "with your right arm" (0/591). The
        stabilize-arm role is now implicit: turning a wrench in a
        block on a smooth table requires one gripper to counter the
        reaction torque, or the block spins. The policy infers this
        from physics, not from explicit instruction. "Turn" as an
        active rotation verb is itself 0/591 in the corpus (only
        "turned over" exists, as passive participle in flip tasks),
        so the core verb is unavoidably OOD.
      scoring_note: |
        Success = ANY visible rotation of the allen wrench while the
        wooden block stayed put. Direction and magnitude don't matter;
        what's measured is whether the policy applied torque through
        the wrench while the other arm successfully countered the
        reaction torque. A wrench that doesn't move means the block
        slipped or the gripper missed.
